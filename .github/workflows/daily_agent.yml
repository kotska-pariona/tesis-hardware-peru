name: Hardware Peru — Data Agent v5.0

on:
  schedule:
    - cron: '0 */2 * * *'   # Cada 2 horas = 12 snapshots/día

  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de ejecución'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal        # local PE + eBay
          - local_only    # solo Falabella/Ripley/Hiraoka
          - historical    # eBay + CamelCamelCamel + PCPartPicker
          - kaggle_only   # solo Kaggle (ejecutar 1 vez)
          - full          # todo

permissions:
  contents: write

jobs:
  collect-data:
    name: "🤖 Recolección — ${{ github.event.inputs.mode || 'normal' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 55

    env:
      EBAY_APP_ID:        ${{ secrets.EBAY_APP_ID }}
      KAGGLE_USERNAME:    ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY:         ${{ secrets.KAGGLE_KEY }}
      RUN_MODE:           ${{ github.event.inputs.mode || 'normal' }}
      OUTPUT_DIR:         data/raw          # ← ruta correcta para GitHub Actions
      TZ:                 America/Lima

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python ──────────────────────────────────────────────────────
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Dependencias (solo scraping, sin ML) ────────────────────────
      - name: "📦 Instalar dependencias"
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            beautifulsoup4 \
            lxml \
            pandas \
            kaggle \
            python-dotenv \
            urllib3

      # ── 4. Info del run ────────────────────────────────────────────────
      - name: "ℹ️ Info del run"
        run: |
          echo "════════════════════════════════"
          echo "  Modo     : $RUN_MODE"
          echo "  Hora UTC : $(date '+%Y-%m-%d %H:%M:%S')"
          echo "  Trigger  : ${{ github.event_name }}"
          echo "════════════════════════════════"
          echo "BATCH_ID=batch_$(date '+%Y%m%d_%H%M%S')" >> $GITHUB_ENV

      # ── 5. Ejecutar pipeline ───────────────────────────────────────────
      - name: "🚀 Ejecutar recolección"
        run: |
          # CRÍTICO: ejecutar desde la raíz del repo, no desde agent/
          python agent/main.py \
            --mode "$RUN_MODE" \
            --batch-id "$BATCH_ID"

      # ── 6. Verificar resultados ────────────────────────────────────────
      - name: "🔍 Verificar datos"
        run: |
          echo "── Archivos generados ──"
          ls -lh data/raw/ | grep -E "batch_|MASTER" | tail -15

          echo ""
          echo "── MASTER CSV ──"
          if [ -f data/raw/MASTER_hardware_peru.csv ]; then
            LINES=$(wc -l < data/raw/MASTER_hardware_peru.csv)
            echo "  Registros: $((LINES - 1))"
            echo "  Tamaño:    $(du -sh data/raw/MASTER_hardware_peru.csv | cut -f1)"
          else
            echo "  ⚠️ MASTER no encontrado"
          fi

          echo ""
          echo "── Reporte del batch ──"
          REPORT="data/raw/report_${BATCH_ID}.json"
          if [ -f "$REPORT" ]; then
            cat "$REPORT"
          fi

      # ── 7. Batch 24h (combinar últimos 12 runs) ────────────────────────
      - name: "📊 Generar batch 24h"
        run: |
          python - <<'PYEOF'
          import os, glob, pandas as pd
          from datetime import datetime, timedelta, timezone

          raw_dir = "data/raw"
          now     = datetime.now(timezone.utc)
          cutoff  = now - timedelta(hours=24)

          batch_files = sorted(glob.glob(f"{raw_dir}/batch_*_local.csv") +
                               glob.glob(f"{raw_dir}/batch_*_ebay.csv")  +
                               glob.glob(f"{raw_dir}/batch_*_dolar.csv"))

          recent = []
          for f in batch_files:
              try:
                  # Extraer timestamp: batch_YYYYMMDD_HHMMSS_tag.csv
                  parts  = os.path.basename(f).split("_")
                  ts_str = f"{parts[1]}_{parts[2]}"
                  ts     = datetime.strptime(ts_str, "%Y%m%d_%H%M%S").replace(tzinfo=timezone.utc)
                  if ts >= cutoff:
                      recent.append(f)
              except (ValueError, IndexError):
                  continue

          print(f"Batches últimas 24h: {len(recent)}")
          if recent:
              dfs = [pd.read_csv(f) for f in recent if os.path.exists(f)]
              if dfs:
                  combined = pd.concat(dfs, ignore_index=True)
                  out = f"{raw_dir}/batch_24h_{now.strftime('%Y%m%d')}.csv"
                  combined.to_csv(out, index=False)
                  print(f"✅ Batch 24h: {out} ({len(combined):,} registros)")
          PYEOF

      # ── 8. Commit y push ───────────────────────────────────────────────
      - name: "💾 Commit datos"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/raw/

          if git diff --staged --quiet; then
            echo "ℹ️ Sin cambios nuevos"
          else
            MASTER_LINES=$(wc -l < data/raw/MASTER_hardware_peru.csv 2>/dev/null || echo "?")
            git commit -m "🤖 [${BATCH_ID}] ${RUN_MODE} — ~${MASTER_LINES} registros"
            git push origin main
            echo "✅ Push exitoso"
          fi

      # ── 9. Resumen ─────────────────────────────────────────────────────
      - name: "📋 Resumen"
        if: always()
        run: |
          echo "════════════════════════════════"
          echo "  Batch : $BATCH_ID"
          echo "  Modo  : $RUN_MODE"
          echo "  Status: ${{ job.status }}"
          if [ -f data/raw/MASTER_hardware_peru.csv ]; then
            echo "  Master: $(wc -l < data/raw/MASTER_hardware_peru.csv) líneas"
          fi
          echo "════════════════════════════════"
