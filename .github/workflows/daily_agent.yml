name: Daily Hardware Scraper v4.0

on:
  schedule:
    - cron: '0 14 * * *'   # 9:00 AM Lima (UTC-5) todos los días
  workflow_dispatch:        # ejecución manual desde GitHub

env:
  OUTPUT_DIR:        data/raw          # ✅ FIX 1: ruta correcta
  MAX_PAGES_IMPORT:  "5"
  MAX_PAGES_COMP:    "30"
  DELAY_REQ:         "2.5"
  DELAY_CAT:         "5.0"
  EBAY_APP_ID:       ${{ secrets.EBAY_APP_ID }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ──────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # ── 3. Crear carpeta data/raw ──────────────────────────────────────
      - name: Preparar carpeta data/raw
        run: mkdir -p data/raw            # ✅ FIX 3: carpeta correcta

      # ── 4. Ejecutar pipeline completo ─────────────────────────────────
      - name: Run pipeline completo
        id: pipeline
        run: |
          python agent/main.py --only ambos 2>&1 | tee data/raw/pipeline.log   # ✅ FIX 2
          BATCH_ID=$(grep "^BATCH_ID=" data/raw/pipeline.log | tail -1 | cut -d= -f2)
          TOTAL_IMPORT=$(grep "^TOTAL_IMPORT=" data/raw/pipeline.log | tail -1 | cut -d= -f2)
          TOTAL_COMP=$(grep "^TOTAL_COMP=" data/raw/pipeline.log | tail -1 | cut -d= -f2)
          TC=$(grep "^TIPO_CAMBIO=" data/raw/pipeline.log | tail -1 | cut -d= -f2)
          echo "batch_id=$BATCH_ID"         >> $GITHUB_OUTPUT
          echo "total_import=$TOTAL_IMPORT" >> $GITHUB_OUTPUT
          echo "total_comp=$TOTAL_COMP"     >> $GITHUB_OUTPUT
          echo "tipo_cambio=$TC"            >> $GITHUB_OUTPUT

      # ── 5. Estadísticas del MASTER CSV ────────────────────────────────
      - name: Stats MASTER_hardware_peru.csv
        run: |
          echo "=== MASTER CSV ==="
          if [ -f data/raw/MASTER_hardware_peru.csv ]; then    # ✅ FIX 4
            echo "Total filas: $(wc -l < data/raw/MASTER_hardware_peru.csv)"
            echo "Items IMPORTAR_AHORA:"
            grep -c "IMPORTAR_AHORA" data/raw/MASTER_hardware_peru.csv || echo "0"
            echo "Top 5 ROI más alto:"
            python3 -c "
          import csv
          rows = []
          with open('data/raw/MASTER_hardware_peru.csv') as f:   # ✅ FIX 4
              for r in csv.DictReader(f):
                  try:
                      rows.append((
                          float(r.get('roi_pct', 0)),
                          r.get('title', '')[:50],
                          r.get('source', ''),
                          r.get('category', '')
                      ))
                  except:
                      pass
          rows.sort(reverse=True)
          for roi, title, src, cat in rows[:5]:
              print(f'  ROI {roi:.1f}% | {cat} | {src} | {title}')
          "
          else
            echo "MASTER CSV aún no existe — primer batch"
          fi

      # ── 6. Commit y push de datos ─────────────────────────────────────
      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📦 batch ${{ steps.pipeline.outputs.batch_id }} | import=${{ steps.pipeline.outputs.total_import }} comp=${{ steps.pipeline.outputs.total_comp }} TC=${{ steps.pipeline.outputs.tipo_cambio }}"
          git push

      # ── 7. Job Summary ────────────────────────────────────────────────
      - name: Job Summary
        run: |
          echo "## 📊 Batch ${{ steps.pipeline.outputs.batch_id }}" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Items importación | ${{ steps.pipeline.outputs.total_import }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Items competencia | ${{ steps.pipeline.outputs.total_comp }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tipo de cambio | ${{ steps.pipeline.outputs.tipo_cambio }} |" >> $GITHUB_STEP_SUMMARY
