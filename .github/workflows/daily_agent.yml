# ════════════════════════════════════════════════════════════
# Hardware Peru — Data Agent v6.0
# CAMBIOS v6.0 (sobre v5.0):
#   [W1] BATCH_ID: $(date) → TZ='America/Lima' date (timestamp PE)
#   [W2] pip: agregado scrapy
#   [W3] pip: agregado ebaysdk
#   [W4] descriptions de modos actualizadas para reflejar main.py real
#   [W5] description 'historical' aclarada (camel/pcpartpicker pendientes)
#   [W6] Step commit: reordenado → pull PRIMERO, luego add+commit+push
#   [W7] Batch 24h: fecha en zona PE (ZoneInfo America/Lima)
#   [W8] Batch 24h: regex corregido → soporta prefijo 'batch_batch_'
#   [W9] actions/checkout y setup-python: versiones con Node 24
# ════════════════════════════════════════════════════════════
name: Hardware Peru — Data Agent v6.0

on:
  schedule:
    - cron: '0 */2 * * *'   # Cada 2 horas = 12 snapshots/día

  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de ejecución'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal        # [W4] local PE + MeLi + importación + competencia
          - local_only    # solo Falabella/Ripley/Hiraoka
          - historical    # eBay + CamelCamelCamel + PCPartPicker (scrapers pendientes)
          - kaggle_only   # solo Kaggle (ejecutar 1 vez manualmente)
          - full          # todo

concurrency:
  group: data-collection-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect-data:
    name: "🤖 Recolección — ${{ github.event.inputs.mode || 'normal' }}"
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event.inputs.mode == 'full' && 90 || 55 }}

    env:
      EBAY_APP_ID:     ${{ secrets.EBAY_APP_ID }}
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY:      ${{ secrets.KAGGLE_KEY }}
      RUN_MODE:        ${{ github.event.inputs.mode || 'normal' }}
      OUTPUT_DIR:      data/raw
      TZ:              America/Lima

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: "📥 Checkout"
        uses: actions/checkout@v4.2.2    # [W9] Node 24
        with:
          fetch-depth: 0

      # ── 2. Python ────────────────────────────────────────────────
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5.4.0  # [W9] Node 24
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Dependencias ──────────────────────────────────────────
      - name: "📦 Instalar dependencias"
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            "requests[security]" \
            beautifulsoup4 \
            lxml \
            scrapy \
            pandas \
            "numpy>=1.26,<3" \
            kaggle \
            python-dotenv \
            urllib3 \
            tenacity \
            fake-useragent \
            cloudscraper \
            pytz \
            ebaysdk

      # ── 4. Info del run ──────────────────────────────────────────
      - name: "ℹ️ Info del run"
        run: |
          echo "════════════════════════════════"
          echo "  Modo     : $RUN_MODE"
          echo "  Hora UTC : $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "  Hora PE  : $(TZ='America/Lima' date '+%Y-%m-%d %H:%M:%S')"
          echo "  Trigger  : ${{ github.event_name }}"
          echo "════════════════════════════════"
          # [W1] BATCH_ID en hora PE para consistencia con los archivos CSV
          echo "BATCH_ID=batch_$(TZ='America/Lima' date '+%Y%m%d_%H%M%S')" >> $GITHUB_ENV

      # ── 5. Ejecutar pipeline ─────────────────────────────────────
      - name: "🚀 Ejecutar recolección"
        run: |
          PYTHONPATH=agent:configuracion python agent/main.py \
            --mode "$RUN_MODE" \
            --batch-id "$BATCH_ID"

      # ── 6. Verificar resultados ──────────────────────────────────
      - name: "🔍 Verificar datos"
        run: |
          echo "── Archivos generados ──"
          ls -lh data/raw/ | grep -E "batch_|MASTER" | tail -15

          echo ""
          echo "── MASTER CSV ──"
          if [ -f data/raw/MASTER_hardware_peru.csv ]; then
            LINES=$(wc -l < data/raw/MASTER_hardware_peru.csv)
            echo "  Registros: $((LINES - 1))"
            echo "  Tamaño:    $(du -sh data/raw/MASTER_hardware_peru.csv | cut -f1)"
          else
            echo "  ⚠️ MASTER no encontrado aún (primer run)"
          fi

          echo ""
          echo "── Reporte del batch ──"
          REPORT="data/raw/report_${BATCH_ID}.json"
          if [ -f "$REPORT" ]; then
            cat "$REPORT"
          fi

      # ── 7. Batch 24h ─────────────────────────────────────────────
      - name: "📊 Generar batch 24h"
        run: |
          python - <<'PYEOF'
          import os, glob, re, pandas as pd
          from datetime import datetime, timedelta, timezone
          from zoneinfo import ZoneInfo  # [W7] zona PE

          raw_dir  = "data/raw"
          tz_pe    = ZoneInfo("America/Lima")
          now_utc  = datetime.now(timezone.utc)
          now_pe   = datetime.now(tz_pe)          # [W7] fecha en hora PE
          cutoff   = now_utc - timedelta(hours=24)

          all_batch_files = glob.glob(f"{raw_dir}/batch_*_*.csv")

          recent = []
          for f in all_batch_files:
              basename = os.path.basename(f)
              if basename.startswith("batch_24h_"):
                  continue
              try:
                  # [W8] regex soporta tanto 'batch_YYYYMMDD_' como 'batch_batch_YYYYMMDD_'
                  m = re.match(r"batch_(?:batch_)?(\d{8})_(\d{6})_", basename)
                  if not m:
                      continue
                  ts_str = f"{m.group(1)}_{m.group(2)}"
                  ts = datetime.strptime(ts_str, "%Y%m%d_%H%M%S").replace(tzinfo=timezone.utc)
                  if ts >= cutoff:
                      recent.append(f)
              except (ValueError, AttributeError):
                  continue

          tags = {}
          for f in recent:
              parts = os.path.basename(f).split("_")
              # soporta prefijo simple y doble
              tag_idx = 3 if parts[1] == "batch" else 2
              tag = parts[tag_idx].replace(".csv", "") if tag_idx < len(parts) else "unknown"
              tags[tag] = tags.get(tag, 0) + 1

          print(f"Batches últimas 24h: {len(recent)}")
          print(f"Por fuente: {tags}")

          if recent:
              dfs = []
              for f in recent:
                  try:
                      dfs.append(pd.read_csv(f, low_memory=False))
                  except Exception as e:
                      print(f"  Error leyendo {f}: {e}")

              if dfs:
                  combined = pd.concat(dfs, ignore_index=True)
                  # [W7] nombre del archivo con fecha PE
                  out = f"{raw_dir}/batch_24h_{now_pe.strftime('%Y%m%d')}.csv"
                  combined.to_csv(out, index=False)
                  print(f"✅ Batch 24h guardado: {out}")
                  print(f"   Registros: {len(combined):,}")
                  if "source" in combined.columns:
                      print(f"   Por fuente:\n{combined['source'].value_counts().to_string()}")
          else:
              print("⚠️ Sin batches recientes (primer run del día)")
          PYEOF

      # ── 8. Commit ────────────────────────────────────────────────
      # [W6] Orden corregido: pull PRIMERO → evita 'uncommitted changes'
      - name: "💾 Commit datos"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # [W6] Pull ANTES de staging para evitar conflicto de rebase
          git pull --rebase origin main || true

          git add data/raw/

          if git diff --staged --quiet; then
            echo "ℹ️ Sin cambios nuevos para commitear"
          else
            MASTER_LINES=$(python -c "
          import csv, pathlib
          f = pathlib.Path('data/raw/MASTER_hardware_peru.csv')
          print(sum(1 for _ in open(f)) - 1 if f.exists() else 0)
          " 2>/dev/null || echo "0")

            git commit -m "🤖 [${BATCH_ID}] ${RUN_MODE} — ${MASTER_LINES} registros"
            git push origin main
            echo "✅ Push exitoso — ${MASTER_LINES} registros en MASTER"
          fi

      # ── 9. Resumen ───────────────────────────────────────────────
      - name: "📋 Resumen"
        if: always()
        run: |
          echo "════════════════════════════════"
          echo "  Batch  : $BATCH_ID"
          echo "  Modo   : $RUN_MODE"
          echo "  Status : ${{ job.status }}"
          echo "  Hora PE: $(TZ='America/Lima' date '+%H:%M:%S')"
          if [ -f data/raw/MASTER_hardware_peru.csv ]; then
            LINES=$(wc -l < data/raw/MASTER_hardware_peru.csv)
            echo "  Master : $((LINES - 1)) registros"
          fi
          echo "════════════════════════════════"
