# ════════════════════════════════════════════════════════════
# Hardware Peru — Data Agent v6.4
# CAMBIOS v6.4 (sobre v6.3):
#   [W26] FIX: BATCH_ID ahora se genera en UTC (antes usaba hora PE
#         pero el batch 24h lo interpretaba como UTC → desfase de 5h,
#         causando que la ventana real de "últimas 24h" cubriera solo
#         ~19h reales, excluyendo batches silenciosamente).
#         Efecto secundario: elimina el doble prefijo "batch_batch_"
#         en los nombres de archivo → regex del paso 7 simplificado.
#
# CAMBIOS v6.3 (sobre v6.2):
#   [W23] FIX CRÍTICO: [W19] estaba incompleto — `git add` (staging)
#         NO satisface el requisito de "working tree limpio" que exige
#         `git pull --rebase`. Git sigue reportando "uncommitted changes"
#         aunque los archivos estén staged. La solución real es hacer
#         COMMIT completo ANTES del pull --rebase, no solo `git add`.
#         Orden correcto: add → commit → pull --rebase → push.
#   [W24] Push con reintentos (3x) — protege contra carreras si dos
#         workflows (daily_agent.yml y pipeline.yml) commitean casi
#         a la vez pese al concurrency group.
#   [W25] rebase --abort explícito en cada fallo de reintento, para
#         no dejar el repo en estado "rebase in progress" a mitad de retry.
#
# CAMBIOS v6.2 (sobre v6.1):
#   [W19] git add ANTES de pull --rebase (fix bug "unstaged changes")
#         — INCOMPLETO, corregido en [W23] arriba.
#   [W20] ebaysdk eliminado de pip install (no usado — OAuth2 directo)
#   [W21] batch 24h: escritura atómica con .tmp → rename (anti-corrupción)
#   [W22] Compumundo: flag COMPUMUNDO_ENABLED=false via env (ahorra ~12 min)
# ════════════════════════════════════════════════════════════
name: Hardware Peru — Data Agent v6.4

on:
  schedule:
    - cron: '0 */3 * * *'   # [W16] cada 3h = 8 snapshots/día, margen 2h+

  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de ejecución'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal        # local PE + MeLi + eBay + importación + competencia
          - local_only    # [W12] Falabella/Hiraoka/Coolbox/Compumundo + MeLi + importacion
          - historical    # eBay + CamelCamelCamel + PCPartPicker + importacion
          - kaggle_only   # solo Kaggle (ejecutar 1 vez manualmente)
          - full          # todo (~110 min, usa MAX_ELAPSED_S para merge seguro)

concurrency:
  group: data-collection-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect-data:
    name: "🤖 Recolección — ${{ github.event.inputs.mode || 'normal' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 90    # [W11] valor fijo — control real via MAX_ELAPSED_S en main.py

    env:
      EBAY_APP_ID:          ${{ secrets.EBAY_APP_ID }}
      EBAY_CLIENT_SECRET:   ${{ secrets.EBAY_CLIENT_SECRET }}   # [W10]
      KAGGLE_USERNAME:      ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY:           ${{ secrets.KAGGLE_KEY }}
      RUN_MODE:             ${{ github.event.inputs.mode || 'normal' }}
      OUTPUT_DIR:           data/raw
      TZ:                   America/Lima
      COMPUMUNDO_ENABLED:   "false"   # [W22] SSL mismatch permanente — ~12 min ahorrados

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: "📥 Checkout"
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      # ── 2. Python ──────────────────────────────────────────────
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Dependencias ────────────────────────────────────────
      - name: "📦 Instalar dependencias"
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            "requests[security]" \
            beautifulsoup4 \
            lxml \
            scrapy \
            pandas \
            "numpy>=1.26,<3" \
            kaggle \
            python-dotenv \
            urllib3 \
            tenacity \
            fake-useragent \
            cloudscraper \
            pytz \
            tzdata
          # [W14] tzdata necesario para ZoneInfo("America/Lima") en ubuntu-latest
          # [W20] ebaysdk eliminado — OAuth2 se maneja directo con requests

      # ── 4. Info del run ────────────────────────────────────────
      - name: "ℹ️ Info del run"
        run: |
          echo "════════════════════════════════"
          echo "  Modo     : $RUN_MODE"
          echo "  Hora UTC : $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "  Hora PE  : $(TZ='America/Lima' date '+%Y-%m-%d %H:%M:%S')"
          echo "  Trigger  : ${{ github.event_name }}"
          echo "════════════════════════════════"
          # [W26] BATCH_ID en UTC — evita el desfase de 5h que tenía el
          #       cálculo del batch 24h (paso 7), y elimina el doble
          #       prefijo "batch_batch_" en los nombres de archivo
          echo "BATCH_ID=$(date -u '+%Y%m%d_%H%M%S')" >> $GITHUB_ENV

          # [W17] MAX_ELAPSED_S según modo
          if [ "$RUN_MODE" = "full" ]; then
            echo "MAX_ELAPSED_S=5100" >> $GITHUB_ENV   # 85 min (margen 5 min)
          else
            echo "MAX_ELAPSED_S=3000" >> $GITHUB_ENV   # 50 min
          fi

      # ── 5. Ejecutar pipeline ───────────────────────────────────
      - name: "🚀 Ejecutar recolección"
        run: |
          # [W13] PYTHONPATH incluye agent/scrapers
          PYTHONPATH=agent:agent/scrapers:configuracion \
          python agent/main.py \
            --mode "$RUN_MODE" \
            --batch-id "$BATCH_ID" \
            --max-elapsed "$MAX_ELAPSED_S"   # [W17]

      # ── 6. Verificar resultados ────────────────────────────────
      - name: "🔍 Verificar datos"
        run: |
          echo "── Archivos generados ──"
          ls -lh data/raw/ | grep -E "batch_|MASTER" | tail -15

          echo ""
          echo "── MASTER CSV ──"
          if [ -f data/raw/MASTER_hardware_peru.csv ]; then
            LINES=$(wc -l < data/raw/MASTER_hardware_peru.csv)
            echo "  Registros: $((LINES - 1))"
            echo "  Tamaño:    $(du -sh data/raw/MASTER_hardware_peru.csv | cut -f1)"
          else
            echo "  ⚠️ MASTER no encontrado aún (primer run)"
          fi

          echo ""
          echo "── Reporte del batch ──"
          REPORT="data/raw/report_${BATCH_ID}.json"
          if [ -f "$REPORT" ]; then
            cat "$REPORT"
          fi

      # ── 7. Batch 24h ───────────────────────────────────────────
      - name: "📊 Generar batch 24h"
        run: |
          python - <<'PYEOF'
          import os, glob, re, shutil, pandas as pd
          from datetime import datetime, timedelta, timezone
          from zoneinfo import ZoneInfo   # [W14] tzdata instalado arriba

          raw_dir  = "data/raw"
          tz_pe    = ZoneInfo("America/Lima")
          now_utc  = datetime.now(timezone.utc)
          now_pe   = datetime.now(tz_pe)
          cutoff   = now_utc - timedelta(hours=24)

          all_batch_files = glob.glob(f"{raw_dir}/batch_*_*.csv")

          recent = []
          for f in all_batch_files:
              basename = os.path.basename(f)
              if basename.startswith("batch_24h_"):
                  continue
              try:
                  # [W26] BATCH_ID ya nace en UTC — regex simplificado,
                  #       sin necesidad del grupo opcional (?:batch_)?
                  m = re.match(r"batch_(\d{8})_(\d{6})_", basename)
                  if not m:
                      continue
                  ts_str = f"{m.group(1)}_{m.group(2)}"
                  ts = datetime.strptime(ts_str, "%Y%m%d_%H%M%S").replace(tzinfo=timezone.utc)
                  if ts >= cutoff:
                      recent.append(f)
              except (ValueError, AttributeError):
                  continue

          # [W18] tag parsing con regex directo — sin lógica de índices frágil
          tags = {}
          for f in recent:
              basename = os.path.basename(f)
              m2 = re.match(r"batch_\d{8}_\d{6}_(.+)\.csv", basename)
              tag = m2.group(1) if m2 else "unknown"
              tags[tag] = tags.get(tag, 0) + 1

          print(f"Batches últimas 24h: {len(recent)}")
          print(f"Por fuente: {tags}")

          if recent:
              dfs = []
              for f in recent:
                  try:
                      dfs.append(pd.read_csv(f, low_memory=False))
                  except Exception as e:
                      print(f"  Error leyendo {f}: {e}")

              if dfs:
                  combined = pd.concat(dfs, ignore_index=True)
                  out = f"{raw_dir}/batch_24h_{now_pe.strftime('%Y%m%d')}.csv"
                  tmp = out + ".tmp"
                  combined.to_csv(tmp, index=False)
                  shutil.move(tmp, out)   # [W21] escritura atómica — anti-corrupción
                  print(f"✅ Batch 24h guardado: {out}")
                  print(f"   Registros: {len(combined):,}")
                  if "source" in combined.columns:
                      print(f"   Por fuente:\n{combined['source'].value_counts().to_string()}")
          else:
              print("⚠️ Sin batches recientes (primer run del día)")
          PYEOF

      # ── 8. Commit ──────────────────────────────────────────────
      # [W23] FIX REAL: commit COMPLETO antes de pull --rebase.
      # `git add` (staging) NO satisface el requisito de git para rebasear;
      # el índice debe estar COMMITEADO, no solo staged.
      # Orden correcto: add → commit → pull --rebase → push.
      - name: "💾 Commit datos"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/raw/

          if git diff --staged --quiet; then
            echo "ℹ️ Sin cambios nuevos para commitear"
            exit 0
          fi

          MASTER_LINES=$(python -c "
          import pathlib
          f = pathlib.Path('data/raw/MASTER_hardware_peru.csv')
          print(sum(1 for _ in open(f)) - 1 if f.exists() else 0)
          " 2>/dev/null || echo "0")

          # [W23] Commit ANTES del rebase — deja el índice limpio de verdad
          git commit -m "🤖 [${BATCH_ID}] ${RUN_MODE} — ${MASTER_LINES} registros"

          # [W15] Pull con falla explícita — no silenciar errores reales
          # Ahora el índice SÍ está limpio (commiteado), el rebase puede proceder
          REBASE_OK=false
          for i in 1 2 3; do
            if git pull --rebase origin main; then
              REBASE_OK=true
              break
            else
              echo "⚠️ pull --rebase falló (intento $i/3) — abortando rebase y reintentando"
              git rebase --abort 2>/dev/null || true   # [W25]
              sleep $((i * 5))
            fi
          done

          if [ "$REBASE_OK" = false ]; then
            echo "❌ git pull --rebase falló tras 3 intentos"
            echo "💾 El commit sigue local en este runner — no se perdió el dato,"
            echo "   pero requiere revisión manual del branch main."
            exit 1
          fi

          # [W24] Push con reintentos — protege contra carreras entre workflows
          PUSH_OK=false
          for i in 1 2 3; do
            if git push origin main; then
              PUSH_OK=true
              break
            else
              echo "⚠️ git push falló (intento $i/3) — re-sincronizando"
              git pull --rebase origin main || true
              sleep $((i * 5))
            fi
          done

          if [ "$PUSH_OK" = false ]; then
            echo "❌ git push falló tras 3 intentos"
            exit 1
          fi

          echo "✅ Push exitoso — ${MASTER_LINES} registros en MASTER"

      # ── 9. Resumen ─────────────────────────────────────────────
      - name: "📋 Resumen"
        if: always()
        run: |
          echo "════════════════════════════════"
          echo "  Batch  : $BATCH_ID"
          echo "  Modo   : $RUN_MODE"
          echo "  Status : ${{ job.status }}"
          echo "  Hora PE: $(TZ='America/Lima' date '+%H:%M:%S')"
          if [ -f data/raw/MASTER_hardware_peru.csv ]; then
            LINES=$(wc -l < data/raw/MASTER_hardware_peru.csv)
            echo "  Master : $((LINES - 1)) registros"
          fi
          echo "════════════════════════════════"
