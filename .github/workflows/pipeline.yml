# ════════════════════════════════════════════════════════════
# Pipeline ROI Importación PE — v2.1
# CAMBIOS v2.1 (sobre v2.0):
#   [P10] ebaysdk eliminado de pip install (no usado — OAuth2 directo)
#   [P11] tzdata agregado a pip install (ZoneInfo en ubuntu-latest)
#   [P12] EBAY_CLIENT_SECRET agregado a env del step 6 (faltaba)
#   [P13] git add ANTES de pull --rebase (fix bug "unstaged changes")
#   [P14] git pull --rebase: falla explícita en lugar de || true silencioso
#   [P15] COMPUMUNDO_ENABLED=false via env (SSL mismatch — ahorra ~12 min)
#   [P16] batch 24h: escritura atómica con .tmp → rename (anti-corrupción)
# ════════════════════════════════════════════════════════════
name: Pipeline ROI Importación PE

on:
  schedule:
    # L/M/V a las 08:00 Lima (UTC-5 = 13:00 UTC)
    - cron: "0 13 * * 1,3,5"

  workflow_dispatch:
    inputs:
      only:
        description: "Step a ejecutar"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - scrape
          - scrape-local
          - scrape-import
          - merge
          - roi
      categories:
        description: "Categorías (CPU GPU RAM SSD MOTHERBOARD PSU COOLER CASE)"
        required: false
        default: ""
      sources_import:
        description: "Fuentes importación"
        required: false
        default: "amazon aliexpress ebay"

# [P9] Grupo unificado con daily_agent → evita race condition en MASTER CSV
concurrency:
  group: data-collection-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: "📥 Checkout repo"
        uses: actions/checkout@v4.2.2    # [P7] Node 24
        with:
          fetch-depth: 0

      # ── 2. Python ──────────────────────────────────────────────────
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5.4.0  # [P7] Node 24
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dependencias ────────────────────────────────────────────
      - name: "📦 Instalar dependencias (scraping)"
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            "requests[security]" \
            beautifulsoup4 \
            lxml \
            scrapy \
            pandas \
            "numpy>=1.26,<3" \
            kaggle \
            python-dotenv \
            urllib3 \
            tenacity \
            fake-useragent \
            cloudscraper \
            pytz \
            tzdata
          # [P11] tzdata necesario para ZoneInfo("America/Lima") en ubuntu-latest
          # [P10] ebaysdk eliminado — OAuth2 se maneja directo con requests

      # ── 4. Crear directorios ───────────────────────────────────────
      - name: "📁 Crear directorios"
        run: mkdir -p data/raw data/kaggle logs

      # ── 5. Info del run ────────────────────────────────────────────
      - name: "ℹ️ Info del run"
        run: |
          echo "════════════════════════════════════"
          echo "  Only      : '${{ github.event.inputs.only }}'"
          echo "  Categories: '${{ github.event.inputs.categories }}'"
          echo "  Sources   : '${{ github.event.inputs.sources_import }}'"
          echo "  Hora UTC  : $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "  Hora PE   : $(TZ='America/Lima' date '+%Y-%m-%d %H:%M:%S')"
          echo "════════════════════════════════════"
          # [P3] BATCH_ID en hora PE
          echo "BATCH_ID=batch_$(TZ='America/Lima' date '+%Y%m%d_%H%M%S')" >> $GITHUB_ENV

      # ── 6. Ejecutar pipeline ───────────────────────────────────────
      - name: "🚀 Ejecutar pipeline"
        env:
          # [P4] PYTHONPATH para resolver 'import scrapers' y 'import config'
          PYTHONPATH: "agent:agent/scrapers:configuracion"
          # ── Costos de importación (roi_calculator.py) ──────────────
          IGV:                 "0.18"
          IPM:                 "0.02"
          ARANCEL_AD_VALOREM:  "0.00"
          FLETE_BASE_USD:      "25.0"
          FLETE_POR_KG_USD:    "8.0"
          MARGEN_GANANCIA_MIN: "0.15"
          LIMITE_COURIER_USD:  "200.0"
          # ── Scraping ───────────────────────────────────────────────
          DELAY_REQ:           "3.0"
          DELAY_CAT:           "6.0"
          MAX_PAGES:           "5"
          MAX_PAGES_IMPORT:    "5"
          OUTPUT_DIR:          "data/raw"
          COMPUMUNDO_ENABLED:  "false"   # [P15] SSL mismatch permanente — ~12 min ahorrados
          # ── APIs ───────────────────────────────────────────────────
          EBAY_APP_ID:         ${{ secrets.EBAY_APP_ID }}
          EBAY_CLIENT_SECRET:  ${{ secrets.EBAY_CLIENT_SECRET }}   # [P12] faltaba
          # [P8] Amazon PA API — usado por scraper_importacion.py si está configurado;
          #      el scraper también funciona con BeautifulSoup si las keys están vacías
          AMAZON_ACCESS_KEY:   ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY:   ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG:  ${{ secrets.AMAZON_PARTNER_TAG }}
          KAGGLE_USERNAME:     ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY:          ${{ secrets.KAGGLE_KEY }}
        run: |
          python - <<'PYEOF'
          import subprocess, sys, os

          cmd = [sys.executable, "agent/main.py"]

          only = "${{ github.event.inputs.only }}".strip()
          if only:
              cmd += ["--only", only]

          categories = "${{ github.event.inputs.categories }}".strip()
          if categories:
              cmd += ["--categories"] + categories.split()

          sources = "${{ github.event.inputs.sources_import }}".strip()
          if sources:
              cmd += ["--sources-import"] + sources.split()

          batch_id = os.environ.get("BATCH_ID", "")
          if batch_id:
              cmd += ["--batch-id", batch_id]

          print(f"Ejecutando: {' '.join(cmd)}")
          result = subprocess.run(cmd, check=True)
          sys.exit(result.returncode)
          PYEOF

      # ── 7. Verificar resultados ────────────────────────────────────
      - name: "🔍 Verificar datos generados"
        run: |
          echo "── Archivos en data/raw/ ──"
          ls -lh data/raw/ | grep -E "batch_|MASTER|report" | tail -20

          echo ""
          echo "── MASTER CSV ──"
          if [ -f data/raw/MASTER_hardware_peru.csv ]; then
            LINES=$(wc -l < data/raw/MASTER_hardware_peru.csv)
            echo "  Registros: $((LINES - 1))"
            echo "  Tamaño:    $(du -sh data/raw/MASTER_hardware_peru.csv | cut -f1)"
          else
            echo "  ⚠️ MASTER no encontrado"
          fi

          echo ""
          echo "── Reporte JSON ──"
          REPORT="data/raw/report_${BATCH_ID}.json"
          [ -f "$REPORT" ] && cat "$REPORT" || echo "  Sin reporte"

      # ── 8. Commit y push ───────────────────────────────────────────
      # [P13] Orden correcto: add PRIMERO → pull --rebase → commit → push
      - name: "💾 Commit datos al repo"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # [P13] PRIMERO stagear — working tree limpio antes del rebase
          git add data/raw/
          # NO agregar data/kaggle/ — archivos >100MB rompen git push

          # [P14] Pull con falla explícita — no silenciar errores reales
          git pull --rebase origin main || {
            echo "❌ git pull --rebase falló — abortando rebase"
            git rebase --abort 2>/dev/null || true
            exit 1
          }

          if git diff --staged --quiet; then
            echo "ℹ️ Sin cambios nuevos"
          else
            MASTER_LINES=$(python -c "
          import pathlib
          f = pathlib.Path('data/raw/MASTER_hardware_peru.csv')
          print(sum(1 for _ in open(f)) - 1 if f.exists() else 0)
          " 2>/dev/null || echo "0")

            git commit -m "📊 [${BATCH_ID}] pipeline ROI — ${MASTER_LINES} registros"
            git push origin main
            echo "✅ Push exitoso"
          fi

      # ── 9. Subir artefactos ────────────────────────────────────────
      - name: "📤 Subir artefactos"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-data-${{ github.run_number }}
          path: |
            data/raw/MASTER_hardware_peru.csv
            data/raw/report_*.json
            data/raw/batch_24h_*.csv
            logs/agent.log
          retention-days: 30

      # ── 10. Subir logs en caso de falla ───────────────────────────
      - name: "🚨 Subir logs en caso de falla"
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: logs-error-${{ github.run_number }}
          path: |
            logs/
          retention-days: 7

      # ── 11. Resumen ───────────────────────────────────────────────
      - name: "📋 Resumen"
        if: always()
        run: |
          echo "════════════════════════════════════"
          echo "  Batch  : $BATCH_ID"
          echo "  Status : ${{ job.status }}"
          echo "  Hora PE: $(TZ='America/Lima' date '+%H:%M:%S')"
          if [ -f data/raw/MASTER_hardware_peru.csv ]; then
            LINES=$(wc -l < data/raw/MASTER_hardware_peru.csv)
            echo "  Master : $((LINES - 1)) registros"
          fi
          echo "════════════════════════════════════"
