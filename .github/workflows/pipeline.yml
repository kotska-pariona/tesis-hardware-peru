# ════════════════════════════════════════════════════════════
# Pipeline ROI Importación PE — v2.3
# CAMBIOS v2.3 (sobre v2.2):
#   [P22] BUG FIX: Conflicto MASTER en rebase — usar merge -X ours
#   [P23] BUG FIX: Coolbox GQL 500 — deshabilitado temporalmente
#   [P24] MEJORA: git push con force-with-lease en lugar de rebase
# ════════════════════════════════════════════════════════════
name: Pipeline ROI Importación PE

on:
  schedule:
    - cron: "0 13 * * 1,3,5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de ejecución"
        required: true
        default: "local_only"
        type: choice
        options:
          - local_only
          - normal
          - historical
          - kaggle_only
          - full

concurrency:
  group: data-collection-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: "📥 Checkout repo"
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Instalar dependencias"
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml scrapy pandas numpy kaggle python-dotenv urllib3 tenacity fake-useragent cloudscraper pytz tzdata

      - name: "📁 Crear directorios"
        run: mkdir -p data/raw data/logs

      - name: "ℹ️ Info del run"
        run: |
          echo "BATCH_ID=$(TZ='America/Lima' date '+%Y%m%d_%H%M%S')" >> $GITHUB_ENV

      - name: "🚀 Ejecutar pipeline"
        env:
          PYTHONPATH: "agent:agent/scrapers:configuracion"
          IGV: "0.18"
          IPM: "0.02"
          FLETE_BASE_USD: "25.0"
          FLETE_POR_KG_USD: "8.0"
          MARGEN_GANANCIA_MIN: "0.15"
          LIMITE_COURIER_USD: "200.0"
          DELAY_REQ: "3.0"
          COMPUMUNDO_ENABLED: "false"
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          AMAZON_ACCESS_KEY: ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY: ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          python - <<'PYEOF'
          import subprocess, sys, os
          mode = "${{ github.event.inputs.mode }}" or "local_only"
          cmd = [sys.executable, "agent/main.py", "--mode", mode]

          batch_id = os.environ.get("BATCH_ID")
          if batch_id:
              cmd += ["--batch-id", batch_id]

          print(f"Ejecutando: {' '.join(cmd)}")
          subprocess.run(cmd, check=True)
          PYEOF

      - name: "🔍 Verificar datos"
        run: |
          echo "── Archivos generados ──"
          ls -lh data/raw/ | tail -20
          echo "── MASTER CSV ──"
          if [ -f data/raw/MASTER_hardware_peru.csv ]; then
            echo "  Registros: $(( $(wc -l < data/raw/MASTER_hardware_peru.csv) - 1 ))"
            echo "  Tamaño:    $(du -sh data/raw/MASTER_hardware_peru.csv | cut -f1)"
          else
            echo "⚠️ MASTER no encontrado"
          fi
          echo "── Reporte del batch ──"
          [ -f "data/raw/report_${BATCH_ID}.json" ] && cat "data/raw/report_${BATCH_ID}.json" || echo "Sin reporte"

      - name: "💾 Commit y Push"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # [P22] Configurar merge driver para CSVs grandes — siempre gana "ours"
          git config merge.ours.driver true

          # Stagear datos nuevos
          git add data/raw/

          if git diff --staged --quiet; then
            echo "ℹ️ Sin cambios nuevos"
          else
            MASTER_LINES=$(python3 -c "
          import pathlib
          f = pathlib.Path('data/raw/MASTER_hardware_peru.csv')
          print(sum(1 for _ in open(f)) - 1 if f.exists() else 0)
          " 2>/dev/null || echo "0")

            git commit -m "🤖 [${BATCH_ID}] normal — ${MASTER_LINES} registros"

            # [P24] Fetch + merge con estrategia ours para archivos grandes
            git fetch origin main

            # Verificar si hay divergencia
            LOCAL=$(git rev-parse HEAD)
            REMOTE=$(git rev-parse origin/main)

            if [ "$LOCAL" = "$REMOTE" ]; then
              echo "✅ Sin divergencia — push directo"
              git push origin main
            else
              echo "⚠️ Divergencia detectada — merge con estrategia ours para MASTER"
              # Merge favoreciendo nuestra versión del MASTER (runner tiene la versión más nueva)
              git merge origin/main \
                --no-edit \
                -m "🔀 merge origin/main [${BATCH_ID}]" \
                -X ours

              for i in {1..3}; do
                git push origin main && { echo "✅ Push OK (intento $i)"; break; } || {
                  echo "⚠️ Push falló (intento $i/3) — reintentando en 10s"
                  sleep 10
                  git fetch origin main
                  git merge origin/main --no-edit -X ours
                }
              done
            fi
          fi

      - name: "📤 Subir artefactos"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-data-${{ github.run_number }}
          path: |
            data/raw/MASTER_hardware_peru.csv
            data/raw/report_*.json
            data/logs/agent.log
          retention-days: 30
