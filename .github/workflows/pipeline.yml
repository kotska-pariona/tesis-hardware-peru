name: Pipeline ROI Importación PE

on:
  schedule:
    # L/M/V a las 08:00 Lima (UTC-5 = 13:00 UTC)
    - cron: "0 13 * * 1,3,5"

  workflow_dispatch:
    inputs:
      # FIX ⚠️1: type: choice para validar valores
      only:
        description: "Step a ejecutar"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - scrape
          - scrape-local
          - scrape-import
          - merge
          - roi
      categories:
        description: "Categorías (CPU GPU RAM SSD MOTHERBOARD PSU COOLER CASE)"
        required: false
        default: ""
      sources_import:
        description: "Fuentes importación"
        required: false
        default: "amazon aliexpress ebay"

# FIX 🔴2: concurrency — evita runs simultáneos
concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

# FIX 🔴1: permissions para git push
permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # FIX ⚠️2: 120 es el máximo absoluto, 90 más seguro

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: "📥 Checkout repo"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # FIX ⚠️7: historial completo para evitar conflictos

      # ── 2. Python ────────────────────────────────────────────────────
      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dependencias — FIX 🔴3: solo scraping, sin ML ────────────
      - name: "📦 Instalar dependencias (scraping)"
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            "requests[security]" \
            beautifulsoup4 \
            lxml \
            pandas \
            numpy \
            kaggle \
            python-dotenv \
            urllib3 \
            tenacity

      # ── 4. FIX ⚠️3: eliminar cache de data/ (redundante + peligroso)
      #    Los datos ya están en el repo vía git.
      #    Solo cachear pip (ya configurado arriba).

      # ── 5. Crear directorios ─────────────────────────────────────────
      - name: "📁 Crear directorios"
        run: mkdir -p data/raw data/kaggle logs

      # ── 6. Info del run ──────────────────────────────────────────────
      - name: "ℹ️ Info del run"
        run: |
          echo "════════════════════════════════════"
          echo "  Only      : '${{ github.event.inputs.only }}'"
          echo "  Categories: '${{ github.event.inputs.categories }}'"
          echo "  Sources   : '${{ github.event.inputs.sources_import }}'"
          echo "  Hora UTC  : $(date '+%Y-%m-%d %H:%M:%S')"
          echo "  Hora PE   : $(TZ='America/Lima' date '+%Y-%m-%d %H:%M:%S')"
          echo "════════════════════════════════════"
          echo "BATCH_ID=batch_$(date '+%Y%m%d_%H%M%S')" >> $GITHUB_ENV

      # ── 7. Ejecutar pipeline — FIX 🔴4: ruta correcta ───────────────
      - name: "🚀 Ejecutar pipeline"
        env:
          # ── Costos de importación (para roi_calculator.py) ───────────
          IGV:                 "0.18"
          IPM:                 "0.02"
          ARANCEL_AD_VALOREM:  "0.00"
          FLETE_BASE_USD:      "25.0"
          FLETE_POR_KG_USD:    "8.0"
          MARGEN_GANANCIA_MIN: "0.15"
          LIMITE_COURIER_USD:  "200.0"
          # ── Scraping ─────────────────────────────────────────────────
          DELAY_REQ:           "3.0"
          DELAY_CAT:           "6.0"
          MAX_PAGES:           "5"
          MAX_PAGES_IMPORT:    "5"
          OUTPUT_DIR:          "data/raw"
          # ── APIs ─────────────────────────────────────────────────────
          EBAY_APP_ID:         ${{ secrets.EBAY_APP_ID }}
          AMAZON_ACCESS_KEY:   ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY:   ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG:  ${{ secrets.AMAZON_PARTNER_TAG }}
          KAGGLE_USERNAME:     ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY:          ${{ secrets.KAGGLE_KEY }}
        run: |
          # FIX ⚠️6: construir args como array Python para evitar shell injection
          python - <<'PYEOF'
          import subprocess, sys, os

          cmd = [sys.executable, "agent/main.py"]

          only = "${{ github.event.inputs.only }}".strip()
          if only:
              cmd += ["--only", only]

          categories = "${{ github.event.inputs.categories }}".strip()
          if categories:
              cmd += ["--categories"] + categories.split()

          sources = "${{ github.event.inputs.sources_import }}".strip()
          if sources:
              cmd += ["--sources-import"] + sources.split()

          batch_id = os.environ.get("BATCH_ID", "")
          if batch_id:
              cmd += ["--batch-id", batch_id]

          print(f"Ejecutando: {' '.join(cmd)}")
          result = subprocess.run(cmd, check=True)
          sys.exit(result.returncode)
          PYEOF

      # ── 8. Verificar resultados ──────────────────────────────────────
      - name: "🔍 Verificar datos generados"
        run: |
          echo "── Archivos en data/raw/ ──"
          ls -lh data/raw/ | grep -E "batch_|MASTER|report" | tail -20

          echo ""
          echo "── MASTER CSV ──"
          if [ -f data/raw/MASTER_hardware_peru.csv ]; then
            LINES=$(wc -l < data/raw/MASTER_hardware_peru.csv)
            echo "  Registros: $((LINES - 1))"
            echo "  Tamaño:    $(du -sh data/raw/MASTER_hardware_peru.csv | cut -f1)"
          else
            echo "  ⚠️ MASTER no encontrado"
          fi

          echo ""
          echo "── Reporte JSON ──"
          REPORT="data/raw/report_${BATCH_ID}.json"
          [ -f "$REPORT" ] && cat "$REPORT" || echo "  Sin reporte"

      # ── 9. FIX 🔴6: Commit y push de datos ──────────────────────────
      - name: "💾 Commit datos al repo"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/raw/
          # NO agregar data/kaggle/ — archivos >100MB rompen git push

          if git diff --staged --quiet; then
            echo "ℹ️ Sin cambios nuevos"
          else
            git pull --rebase origin main || true

            MASTER_LINES=$(python -c "
          import pathlib
          f = pathlib.Path('data/raw/MASTER_hardware_peru.csv')
          print(sum(1 for _ in open(f)) - 1 if f.exists() else 0)
          " 2>/dev/null || echo "0")

            git commit -m "📊 [${BATCH_ID}] pipeline ROI — ${MASTER_LINES} registros"
            git push origin main
            echo "✅ Push exitoso"
          fi

      # ── 10. FIX 🔴5: paths de artefactos corregidos ─────────────────
      - name: "📤 Subir artefactos"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-data-${{ github.run_number }}
          path: |
            data/raw/MASTER_hardware_peru.csv
            data/raw/report_*.json
            data/raw/batch_24h_*.csv
            data/raw/agent.log
          retention-days: 30

      # ── 11. Subir log completo si falla ──────────────────────────────
      - name: "🚨 Subir logs en caso de falla"
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: logs-error-${{ github.run_number }}
          path: |
            data/raw/agent.log
            logs/
          retention-days: 7

      # ── 12. Resumen ──────────────────────────────────────────────────
      - name: "📋 Resumen"
        if: always()
        run: |
          echo "════════════════════════════════════"
          echo "  Batch  : $BATCH_ID"
          echo "  Status : ${{ job.status }}"
          echo "  Hora PE: $(TZ='America/Lima' date '+%H:%M:%S')"
          if [ -f data/raw/MASTER_hardware_peru.csv ]; then
            echo "  Master : $(wc -l < data/raw/MASTER_hardware_peru.csv) líneas"
          fi
          echo "════════════════════════════════════"
