# ══════════════════════════════════════════════════════════════════
# data_contract.yaml v1.1
# Contrato de datos — Tesis: Predicción de precios hardware Perú
# ══════════════════════════════════════════════════════════════════
# CAMBIOS v1.1 (sobre v1.0):
#   [FIX7] completitud_minima_pct pasa de valor único global (95.0)
#   a umbrales diferenciados por criticidad de columna. Justificación:
#   el MASTER es un merge sparse de fuentes heterogéneas (ver nota
#   metodológica abajo). Exigir 95% a TODAS las columnas obligatorias
#   por igual penalizaba injustamente campos secundarios (category,
#   sku, brand) que dependen de la fuente/scraper y nunca alcanzarán
#   ese umbral por diseño, mientras que las columnas núcleo para el
#   modelo (price_usd, price_date) ya cumplen con creces tras la
#   migración (100.00% y 99.97% respectivamente).
#
# NOTA METODOLÓGICA:
# El MASTER_hardware_peru.csv es un merge de múltiples fuentes de
# scraping (MercadoLibre, eBay, importación, local, competencia)
# SIN normalización de esquema. Cada fuente llena sus propias
# columnas específicas y deja NaN en las del resto (estructura
# tipo sparse). Por eso 'columnas_obligatorias' se limita a las
# columnas núcleo necesarias para la serie temporal, y el resto
# se documenta como 'columnas_opcionales' sin bloquear el pipeline.
#
# LIMITACIÓN CONOCIDA — sku:
# El 19.83% faltante de 'sku' proviene casi en su totalidad de los
# scrapers de benchmark (falabella_benchmark, hiraoka_benchmark),
# que no expuenen códigos de producto estructurados en su HTML.
# No es un bug de normalización, es una característica de la fuente.
# Decisión: aceptar como limitación conocida (Opción A). Ver
# migration_report.json y quality_report_20260713_010519.json.

version: 1.1

columnas_obligatorias:
  identificadores:
    - source
    - category
    - sku
    - brand
    - title
  temporalidad:
    - price_date
  precios:
    - price_usd
    - price_pen

columnas_opcionales:
  # Presentes en el MASTER pero no exigidas por validate_schema().
  # Se documentan aquí solo para trazabilidad del esquema completo.
  metadata_batch:
    - batch_id
    - timestamp
  precios_extra:
    - price_orig_pen
    - price_orig_usd
    - discount_pct
    - price_currency
    - original_price
    - currency
    - total_usd
    - shipping_usd
  calidad_producto:
    - rating
    - reviews
    - reviews_count
    - condition
  disponibilidad:
    - available_qty
    - available
    - buy
    - sell
    - sold_qty
    - sold_quantity
  envio:
    - free_shipping
    - shipping_free
  vendedor:
    - seller_nickname
    - seller_feedback_score
    - seller_feedback_pct
    - seller
    - seller_type
    - is_official_store
    - is_best_seller
    - is_good_seller
  identificadores_fuente:
    - retailer
    - part_id
    - asin_sku
    - item_id
    - mid
    - fingerprint
  metadata_scraping:
    - url
    - image_url
    - query
    - category_label
    - country
    - location
    - date
    - scraped_at

reglas_de_validacion:
  # [FIX7] Umbrales diferenciados por criticidad. El script NO aborta
  # si no se cumple; emite warnings por columna (diagnóstico, no
  # bloqueante), salvo que se indique lo contrario en 'bloqueante'.

  completitud_minima_pct:
    columnas_criticas:
      # Núcleo del modelo de series temporales. Deben cumplir 95%+
      # tras la migración. Si fallan, SÍ bloquean Hito H1.
      price_usd: 95.0
      price_date: 95.0
      price_pen: 40.0   # relleno por conversión, no siempre disponible en origen
      source: 95.0
      title: 95.0

    columnas_secundarias:
      # Dependen de la fuente/scraper. Informativas, NO bloquean H1.
      # Umbral = piso observado tras migración - margen de tolerancia.
      category: 55.0
      sku: 75.0
      brand: 35.0

    default: 30.0  # cualquier columna obligatoria no listada arriba

  precio_usd_rango_valido: [1.0, 5000.0]

  duplicados_permitidos: false

  hito_H1:
    # Hito H1 se certifica SOLO sobre columnas_criticas.
    # Las columnas_secundarias se reportan pero no bloquean.
    evaluar_solo: columnas_criticas
